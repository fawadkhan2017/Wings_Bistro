<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>The Wings Bistro | Premium Chicken Wings</title>

    <meta
        name="description"
        content="Serving the crispiest, juiciest, most flavorful wings in the city. Hand-tossed in signature sauces."
    />

    <meta
        name="keywords"
        content="chicken wings, restaurant, fast food, delivery, spicy wings"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

    <!-- React DOM -->
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <link rel="stylesheet" href="https://unpkg.com/lucide-static@latest/font/lucide.css">

    <!-- Font Awesome (optional) -->
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
  />
    <!-- Predefined Tailwind CSS, use it as needed, or update base on your -->
    <style type="text/tailwindcss">
    @layer theme {
        :root {
            --primary: #f5b301;
            --primary-hover: #ffc117;
            --bg-dark: #161616;
            --surface: #1e1e1e;
            --text-muted: #a3a3a3;
        }
    }

    @layer base {
        html {
            scroll-behavior: smooth;
        }
        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .font-heading {
            font-family: Impact, haettenschweiler, 'Arial Narrow semibold', sans-serif;
        }
        /* Hide scrollbar for Chrome, Safari and Opera */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .scrollbar-hide {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    }

    @layer base {
        /* Add or override base styles for HTML elements (e.g., body, h1, p) */
    }

    @layer components {
        .container-custom {
            @apply max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8;
        }
        .btn {
            @apply inline-flex items-center justify-center gap-2 font-bold uppercase tracking-wider transition-all duration-200 rounded shrink-0 focus:outline-none focus:ring-2 focus:ring-[var(--primary)] focus:ring-offset-2 focus:ring-offset-[var(--bg-dark)];
        }
        .btn-primary {
            @apply bg-[var(--primary)] hover:bg-[var(--primary-hover)] text-black border-2 border-[var(--primary)] hover:border-[var(--primary-hover)];
        }
        .btn-outline {
            @apply border-2 border-white/30 hover:border-white text-white;
        }
        .btn-outline-primary {
            @apply border-2 border-[var(--primary)] text-white hover:bg-[var(--primary)] hover:text-black;
        }
        .btn-lg {
            @apply px-8 py-3.5 text-sm;
        }
        .btn-md {
            @apply px-6 py-2.5 text-sm;
        }
        .section-padding {
            @apply py-16 lg:py-24;
        }
        .section-padding-tp
        {
            @apply py-16 lg:py-12;
        }
        .section-padding-none
        {
            @apply py-16 lg:py-0;
        }
        .section-padding-4x
        {
            padding-top: 1rem;
        padding-bottom: 1rem;
        }
        .heading-1 {
            @apply font-heading text-5xl sm:text-6xl lg:text-7xl font-bold uppercase leading-[1.1] text-white;
        }
        .heading-2 {
            @apply font-heading text-4xl sm:text-5xl lg:text-6xl font-bold uppercase leading-[1.1] text-white;
        }
        .heading-subtitle {
            @apply font-heading text-[var(--primary)] text-sm lg:text-base font-bold tracking-widest uppercase mb-4 block;
        }
        .body-text {
            @apply text-gray-400 text-base lg:text-lg leading-relaxed;
        }
    }

    @layer utilities {
        /* Define custom utility classes */
    }
    </style>

</head>
<body>
    <div id="root"></div>
    <script type="text/babel" src="components/Header.js"></script>
    <script type="text/babel" src="components/Hero.js"></script>
    <script type="text/babel" src="components/Features.js"></script>
    <script type="text/babel" src="components/Menu.js"></script>
    <script type="text/babel" src="components/Story.js"></script>
    <script type="text/babel" src="components/Catering.js"></script>
    <script type="text/babel" src="components/Franchise.js"></script>
    <script type="text/babel" src="components/Testimonials.js"></script>
    <script type="text/babel" src="components/Newsletter.js"></script>
    <script type="text/babel" src="components/Footer.js"></script>
    <script type="text/babel" src="app.js"></script>
</body>
</html>
